# yaml-language-server: $schema=https://github.com/rendercv/rendercv/blob/main/schema.json?raw=true

accent_color: &accent_color rgb(31, 85, 95)

design:
  theme: engineeringclassic
  typography:
    font_family: Roboto
  colors:
    name: *accent_color
    headline: *accent_color
    connections: *accent_color
    section_titles: *accent_color
    links: *accent_color
  header:
    connections:
      phone_number_format: international
  page:
    show_top_note: false
    show_footer: false
  templates:
    experience_entry:
      date_and_location_column: |-
        *DATE*
    education_entry:
      date_and_location_column: |-
        *DATE*

